spring:
  application:
    name: Campus-Emprende
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:campus_emprende}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:no-reply@example.com}
    password: ${MAIL_PASSWORD:change-me}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${OAUTH_GITHUB_CLIENT_ID:test-github-client-id}
            client-secret: ${OAUTH_GITHUB_CLIENT_SECRET:test-github-client-secret}
            scope:
              - read:user
              - user:email
            redirect-uri: "{baseUrl}/login/oauth2/code/github"

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-with-at-least-32-characters}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    reset-url: ${FRONTEND_BASE_URL:http://localhost:5173}/auth/reset-password?token=
    verify-url: ${FRONTEND_BASE_URL:http://localhost:5173}/auth/verify-email?token=
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  bootstrap:
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin@campusemprende.local}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123!}
      full-name: ${APP_BOOTSTRAP_ADMIN_FULL_NAME:Campus Emprende Admin}
