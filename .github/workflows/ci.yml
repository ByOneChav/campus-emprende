name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test
      JWT_SECRET: ci-test-secret-key-ci-test-secret-key-123456
      JWT_EXPIRATION_MS: 86400000
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: campus_emprende_test
      DB_USERNAME: test
      DB_PASSWORD: test
      MAIL_USERNAME: test@example.com
      MAIL_PASSWORD: test
      OAUTH_GITHUB_CLIENT_ID: test
      OAUTH_GITHUB_CLIENT_SECRET: test
      FRONTEND_BASE_URL: http://localhost:5173
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run backend tests
        working-directory: Campus-Emprende
        run: |
          chmod +x mvnw
          ./mvnw test

  frontend:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable Corepack
        run: corepack enable
      - name: Install frontend dependencies
        working-directory: campus-emprende-frontend
        run: pnpm install --frozen-lockfile
      - name: Lint frontend
        working-directory: campus-emprende-frontend
        run: pnpm lint
      - name: Build frontend
        working-directory: campus-emprende-frontend
        run: pnpm build
      - name: Test frontend
        working-directory: campus-emprende-frontend
        run: pnpm test
